# Checkly preview checks for pull requests.
# Set the PREVIEW_URL repository variable to your deployment preview URL to enable this workflow.
# The checks run on Checkly and report results back to the pull request.

name: Checkly Preview

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  checkly-preview:
    if: ${{ vars.PREVIEW_URL != '' }}
    runs-on: ubuntu-latest
    env:
      CHECKLY_API_KEY: ${{ secrets.CHECKLY_API_KEY }}
      CHECKLY_ACCOUNT_ID: ${{ secrets.CHECKLY_ACCOUNT_ID }}
      ENVIRONMENT_URL: ${{ vars.PREVIEW_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Checkly preview checks
        uses: checkly/checkly-action@v1
        with:
          command: test
          args: --config checkly.config.ts --reporter github
